name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests examples
      - name: Test
        run: pytest -q
      - name: Demo runs offline
        run: python examples/triage_demo.py
